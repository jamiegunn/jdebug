name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]   # GNU and BSD userlands — sed/tar/ls differences are real
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: tui/go.sum
      - name: Run the test suite (bash kit + Go TUI)
        run: tests/run-tests.sh

  provenance:
    # Enforce, on Linux (a userland the author's macOS is not), that each vendored
    # binary set's recorded source hash matches the committed sources. The recipe
    # is locale-pinned (LC_ALL=C); this job is the machine "you don't control" that
    # catches any collation-dependent drift the local hooks might miss off-box.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TUI + core provenance (committed source hash matches BUILDINFO)
        run: |
          set -euo pipefail
          tui_src=$(cat tui/go.mod tui/go.sum $(ls tui/*.go | LC_ALL=C sort) | sha256sum | awk '{print $1}')
          tui_rec=$(awk -F': ' '/^source_sha256/{print $2}' vendor/tui/BUILDINFO)
          [ "$tui_src" = "$tui_rec" ] || { echo "::error::TUI provenance mismatch: sources=$tui_src BUILDINFO=$tui_rec"; exit 1; }
          echo "TUI provenance OK ($tui_src)"
          if [ -d tools/core ]; then
            core_src=$({ cat core/go.mod core/go.sum 2>/dev/null; find core -name '*.go' -not -name '*_test.go' | LC_ALL=C sort | xargs cat; } | sha256sum | awk '{print $1}')
            core_rec=$(awk -F': ' '/^source_sha256/{print $2}' tools/core/BUILDINFO)
            [ "$core_src" = "$core_rec" ] || { echo "::error::core provenance mismatch: sources=$core_src BUILDINFO=$core_rec"; exit 1; }
            echo "core provenance OK ($core_src)"
          fi

  shellcheck:
    # Advisory: the kit documents its deliberate violations (word-splitting
    # for known-safe names, etc.); treat findings as review input, not gates.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (bash scripts)
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck -S warning jdebug install.sh lib/common.sh capture/*.sh observe/*.sh
      - name: shellcheck (POSIX sh)
        if: always()
        run: shellcheck -s sh -S warning jdebug-local
